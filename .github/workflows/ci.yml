name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows cdylib build is exercised end-to-end in `release.yml` via
        # cibuildwheel; here we run the full clippy + test suite to catch
        # platform-specific regressions on every PR (rather than only at
        # release time).
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test (incl. property tests)
        run: cargo test --workspace --all-targets

  citation:
    name: citation metadata
    runs-on: ubuntu-latest
    # Validates `CITATION.cff` against the Citation File Format 1.2.0 schema
    # and `.zenodo.json` for JSON syntax. Both files are consumed by the
    # GitHub-Zenodo integration at tag time (see RELEASE.md § Zenodo DOI
    # integration); catching schema drift here means a tag never produces
    # a malformed Zenodo record.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install cffconvert
        run: python -m pip install cffconvert
      - name: validate CITATION.cff
        run: cffconvert --validate -i CITATION.cff
      - name: validate .zenodo.json (JSON syntax)
        run: python -m json.tool .zenodo.json > /dev/null

  rust-coverage:
    name: rust coverage (llvm-cov)
    runs-on: ubuntu-latest
    # Linux-only — Rust coverage on macOS/Windows via llvm-cov is noisy and
    # adds little signal that the cross-platform `rust` job above doesn't
    # already give. Reports LCOV to Codecov under the `rust` flag (see
    # codecov.yml for the rollup).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov (workspace)
        # `--lib` only — proptest cases run separately under the `rust` job
        # above. Coverage of the FFI bindings (sparho-py) is exercised
        # end-to-end by the Python test suite under maturin develop and
        # would double-count here.
        run: cargo llvm-cov --lib -p sparho-core --lcov --output-path rust-coverage.lcov
      - name: upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./rust-coverage.lcov
          flags: rust
          name: rust-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Advisory DB is host-independent — one Linux run gates the workspace.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # `--ignore RUSTSEC-2025-0020`: known PyO3 0.22 advisory
        # (`PyString::from_object` buffer overflow). The fix is to upgrade
        # to PyO3 ≥ 0.24, which has API churn worth its own ROADMAP item
        # (see ROADMAP v0.5+ candidates). sparho doesn't call the
        # vulnerable code path. Drop this ignore the same PR that bumps
        # PyO3.
        run: cargo audit --ignore RUSTSEC-2025-0020

  python:
    name: python ${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is exercised on a single Python (3.12) — wider matrix is
        # cibuildwheel's job. Linux + macOS keep the full 3.11–3.13 sweep.
        include:
          - { os: ubuntu-latest, python: "3.11" }
          - { os: ubuntu-latest, python: "3.12" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: macos-latest, python: "3.11" }
          - { os: macos-latest, python: "3.12" }
          - { os: macos-latest, python: "3.13" }
          - { os: windows-latest, python: "3.12" }
    defaults:
      run:
        # git-bash on Windows; the same scripts then work on every runner.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install package + dev deps
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[dev]"
      - name: import smoke
        run: python -c "import sparho; print(sparho.__version__, sparho._core.version())"
      - name: ruff
        run: ruff check python/ tests/
      - name: mypy
        run: mypy
      - name: pytest (with coverage)
        # Coverage XML is uploaded below; gating is via codecov.yml, not
        # pytest --cov-fail-under, so coverage drift is visible on every PR
        # rather than blocking work mid-investigation.
        run: pytest --cov=sparho --cov-report=xml --cov-report=term
      - name: pytest --doctest-modules
        # The public API is currently doctest-free, but wiring the step in
        # now means any future doctest landed in `python/sparho/` is
        # automatically gated. Empty-collection is treated as pass.
        run: pytest --doctest-modules python/sparho
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python-${{ matrix.python }}-${{ matrix.os }}
          name: python-${{ matrix.python }}-${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ci-celer:
    name: ci-celer (optional extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install package + celer + dev
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[celer,dev]"
      - name: pytest
        run: pytest

  ci-min-deps:
    name: ci-min-deps (floor versions)
    runs-on: ubuntu-latest
    # Pins the lower bounds declared in pyproject.toml so a silent version
    # bump in a dependency doesn't quietly become a hard requirement. If
    # this job goes red, either fix the regression or bump the floor in
    # pyproject.toml (and document why in CHANGELOG).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install package + pinned floor deps
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[dev]"
          python -m pip install \
            "numpy==1.24.*" \
            "scipy==1.10.*" \
            "scikit-learn==1.3.*"
      - name: pytest
        run: pytest

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install pre-commit
        run: python -m pip install pre-commit
      - name: pre-commit run --all-files
        run: pre-commit run --all-files --show-diff-on-failure

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install package + docs deps
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[docs]"
      - name: sphinx-build (warnings as errors)
        run: sphinx-build -W -b html docs docs/_build/html
      - uses: actions/upload-artifact@v4
        with:
          name: sparho-docs-html
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 14
