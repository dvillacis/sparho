name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test -p sparho-core --lib

  python:
    name: python ${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: pin PATH (setup-python first; cargo present)
        run: |
          echo "$pythonLocation/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: install package + dev deps
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[dev]"
      - name: import smoke
        run: python -c "import sparho; print(sparho.__version__, sparho._core.version())"
      - name: ruff
        run: ruff check python/ tests/
      - name: mypy
        run: mypy
      - name: pytest
        run: pytest

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pin PATH (setup-python first; cargo present)
        run: |
          echo "$pythonLocation/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: install package + docs deps
        env:
          MATURIN_PEP517_ARGS: "--profile dev"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -v -e ".[docs]"
      - name: sphinx-build (warnings as errors)
        run: sphinx-build -W -b html docs docs/_build/html
      - uses: actions/upload-artifact@v4
        with:
          name: sparho-docs-html
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 14
